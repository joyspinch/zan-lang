name: runtime-tests

# Cross-platform tests for the async runtime (rt_sched + rt_io).
# These build only the standalone C runtime + test suite -- no LLVM, no
# compiler -- so they run in seconds on every hosted runner and give real
# execution coverage on Linux (epoll), Windows (IOCP) and macOS (kqueue).

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  runtime-tests:
    name: runtime-tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Build & run (POSIX)
        if: runner.os != 'Windows'
        run: |
          cc -O2 -Wall -Wextra -I. \
            tests/runtime/rt_test.c src/runtime/rt_sched.c src/runtime/rt_io.c \
            -o rt_test -lpthread
          ./rt_test

      - name: Build & run (Windows / MinGW)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          gcc -O2 -Wall -Wextra -I. tests\runtime\rt_test.c src\runtime\rt_sched.c src\runtime\rt_io.c -o rt_test.exe -lws2_32 -lmswsock
          rt_test.exe

  # Same runtime suite under AddressSanitizer + UndefinedBehaviorSanitizer on
  # Linux. Catches memory errors (use-after-free, OOB, leaks) and UB in the
  # scheduler + epoll reactor that plain execution silently tolerates.
  runtime-sanitizers:
    name: runtime-sanitizers (asan+ubsan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build & run with ASan + UBSan
        run: |
          cc -O1 -g -fsanitize=address,undefined -fno-sanitize-recover=all \
            -Wall -Wextra -I. \
            tests/runtime/rt_test.c src/runtime/rt_sched.c src/runtime/rt_io.c \
            -o rt_test_san -lpthread
          ASAN_OPTIONS=detect_leaks=1 UBSAN_OPTIONS=print_stacktrace=1 ./rt_test_san
