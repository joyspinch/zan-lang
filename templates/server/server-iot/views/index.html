<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{title}}</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
         background:#0d1117; color:#e6edf3; }
  header { padding:18px 24px; background:#161b22; border-bottom:1px solid #30363d; }
  header h1 { margin:0; font-size:18px; }
  header .sub { color:#8b949e; font-size:12px; margin-top:4px; }
  .metrics { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
             gap:12px; padding:20px 24px; }
  .card { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:14px; }
  .card .k { color:#8b949e; font-size:12px; }
  .card .v { font-size:22px; font-weight:600; margin-top:4px; color:#58a6ff; }
  section { padding:0 24px 24px; }
  h2 { font-size:14px; color:#8b949e; text-transform:uppercase; letter-spacing:.05em; }
  table { width:100%; border-collapse:collapse; background:#161b22;
          border:1px solid #30363d; border-radius:8px; overflow:hidden; }
  th,td { text-align:left; padding:8px 12px; border-bottom:1px solid #21262d; font-size:13px; }
  th { color:#8b949e; font-weight:500; background:#0d1117; }
  tr:last-child td { border-bottom:none; }
  .pub { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:12px; }
  .pub input { background:#0d1117; border:1px solid #30363d; color:#e6edf3;
               padding:7px 10px; border-radius:6px; }
  .pub button { background:#238636; border:none; color:#fff; padding:7px 14px;
                border-radius:6px; cursor:pointer; }
  .empty { color:#6e7681; padding:12px; }
  code { color:#79c0ff; }
</style>
</head>
<body>
<header>
  <h1>{{title}}</h1>
  <div class="sub">MQTT 3.1.1 broker console &middot; auto-refresh every 2s</div>
</header>

<div class="metrics" id="metrics"></div>

<section>
  <h2>发布消息 (Publish)</h2>
  <div class="pub">
    <input id="pt" placeholder="topic e.g. sensors/room1/temp" size="30">
    <input id="pp" placeholder="payload" size="24">
    <input id="tok" placeholder="bearer token (rank>=3)" size="24">
    <button onclick="publish()">Publish</button>
    <span id="pres" style="color:#8b949e"></span>
  </div>
</section>

<section>
  <h2>客户端 (Clients)</h2>
  <table><thead><tr><th>#</th><th>client_id</th><th>addr</th><th>subs</th>
  <th>in</th><th>out</th></tr></thead><tbody id="clients"></tbody></table>
</section>

<section>
  <h2>订阅 (Subscriptions)</h2>
  <table><thead><tr><th>client_id</th><th>filter</th><th>qos</th></tr></thead>
  <tbody id="subs"></tbody></table>
</section>

<section>
  <h2>主题 (Topics)</h2>
  <table><thead><tr><th>topic</th><th>messages</th><th>last</th></tr></thead>
  <tbody id="topics"></tbody></table>
</section>

<script>
const esc = s => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
async function j(u){ const r = await fetch(u); return (await r.json()).data; }
function rows(el, arr, cols, empty){
  const b = document.getElementById(el);
  if(!arr || !arr.length){ b.innerHTML = '<tr><td colspan="'+cols.length+'" class="empty">'+empty+'</td></tr>'; return; }
  b.innerHTML = arr.map(o => '<tr>'+cols.map(c => '<td>'+esc(o[c] ?? '')+'</td>').join('')+'</tr>').join('');
}
async function tick(){
  try{
    const m = await j('/iot/metrics');
    const cards = [
      ['在线客户端', m.clients_connected], ['累计连接', m.clients_total],
      ['订阅数', m.subscriptions], ['主题数', m.topics],
      ['收到消息', m.messages_in], ['转发消息', m.messages_out],
      ['入流量B', m.bytes_in], ['出流量B', m.bytes_out],
      ['运行秒', m.uptime_sec]
    ];
    document.getElementById('metrics').innerHTML = cards.map(
      c => '<div class="card"><div class="k">'+c[0]+'</div><div class="v">'+c[1]+'</div></div>').join('');
    rows('clients', await j('/iot/clients'),
      ['id','client_id','addr','subs','msgs_in','msgs_out'], '暂无客户端');
    rows('subs', await j('/iot/subscriptions'),
      ['client_id','filter','qos'], '暂无订阅');
    rows('topics', await j('/iot/topics'),
      ['topic','messages','last'], '暂无主题');
  }catch(e){ /* broker starting */ }
}
async function publish(){
  const t = document.getElementById('pt').value.trim();
  const p = document.getElementById('pp').value;
  const tok = document.getElementById('tok').value.trim();
  const res = document.getElementById('pres');
  if(!t){ res.textContent = 'topic required'; return; }
  const h = {'Content-Type':'application/x-www-form-urlencoded'};
  if(tok) h['Authorization'] = 'Bearer '+tok;
  const r = await fetch('/iot/publish', {method:'POST', headers:h,
    body:'topic='+encodeURIComponent(t)+'&payload='+encodeURIComponent(p)});
  const d = await r.json();
  res.textContent = r.ok ? ('delivered '+(d.data ? d.data.delivered : 0)) : (d.msg || 'error');
  tick();
}
tick(); setInterval(tick, 2000);
</script>
</body>
</html>
