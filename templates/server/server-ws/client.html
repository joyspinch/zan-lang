<!doctype html>
<meta charset="utf-8">
<title>{{NAME}} WebSocket client</title>
<h3>{{NAME}} — WebSocket chat test</h3>
<div>ws:// <input id="url" value="ws://127.0.0.1:8090"> <button onclick="conn()">Connect</button></div>
<p><input id="msg" placeholder="message" onkeydown="if(event.key==='Enter')send()"> <button onclick="send()">Send</button></p>
<pre id="log" style="background:#111;color:#0f0;padding:8px;height:300px;overflow:auto"></pre>
<script>
let ws;
function log(s){const l=document.getElementById('log');l.textContent+=s+"\n";l.scrollTop=l.scrollHeight;}
function conn(){ws=new WebSocket(document.getElementById('url').value);
  ws.onopen=()=>log('[open]');ws.onclose=()=>log('[close]');
  ws.onmessage=e=>log(e.data);ws.onerror=()=>log('[error]');}
function send(){const m=document.getElementById('msg');if(ws&&ws.readyState===1){ws.send(m.value);m.value='';}}
</script>
